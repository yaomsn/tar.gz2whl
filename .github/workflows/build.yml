name: Build Linux WHL
on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用新版node，消除警告
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel setuptools

      - name: Build wheel for Linux
        run: |
          ls *.tar.gz
          tar zxf *.tar.gz
          cd $(ls -d */ | head -n1)
          python -m build --wheel

      - name: Upload built wheel
        uses: actions/upload-artifact@v4
        with:
          name: linux-whl
          path: "*/dist/*.whl"
